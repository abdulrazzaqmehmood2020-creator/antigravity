<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSearch | Premium Keyword Analytics</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Elements -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>
    <div class="noise-overlay"></div>

    <div class="container">
        <!-- Header -->
        <header class="navbar fade-in">
            <div class="logo">
                <i class="fa-solid fa-wind logo-icon"></i>
                <span>Vibe<span class="text-accent">Search</span></span>
            </div>
            <div class="nav-controls">
                <button class="icon-btn" id="theme-toggle"><i class="fa-regular fa-moon"></i></button>
                <button class="btn-primary-sm">Login</button>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Hero Search Section -->
            <section class="hero-section fade-in-up">
                <h1>Unlock Keyword <span class="text-gradient">Potential</span></h1>
                <p class="subtitle">AI-Powered insights for the modern creator.</p>

                <div class="search-wrapper">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="keywordInput"
                            placeholder="Enter a keyword (e.g., 'crypto wallet', 'vegan recipes')..."
                            autocomplete="off">
                        <button id="searchBtn" class="btn-glow">Analyze</button>
                    </div>
                </div>

                <!-- Recent/Popular Chips -->
                <div class="chips-container">
                    <span class="chip">AI Tools</span>
                    <span class="chip">SaaS Growth</span>
                    <span class="chip">Web3</span>
                </div>
            </section>

            <!-- Results Section (Hidden by default) -->
            <section id="resultsSection" class="results-grid hidden">

                <!-- Key Metrics Cards -->
                <div class="card metric-card delay-1">
                    <div class="card-header">
                        <span class="card-title">Search Volume</span>
                        <i class="fa-solid fa-users filter-icon"></i>
                    </div>
                    <div class="metric-value" id="volValue">--</div>
                    <div class="metric-change positive" id="volChange">--</div>
                </div>

                <div class="card metric-card delay-2">
                    <div class="card-header">
                        <span class="card-title">CPC (Cost Per Click)</span>
                        <i class="fa-solid fa-dollar-sign filter-icon"></i>
                    </div>
                    <div class="metric-value" id="cpcValue">--</div>
                    <div class="metric-change" id="cpcLabel">Avg. Bid</div>
                </div>

                <div class="card metric-card delay-3">
                    <div class="card-header">
                        <span class="card-title">Competition</span>
                        <i class="fa-solid fa-trophy filter-icon"></i>
                    </div>
                    <div class="metric-value" id="compValue">--</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="compBar" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Chart Section -->
                <div class="card chart-card delay-4">
                    <div class="card-header">
                        <span class="card-title">12-Month Trend</span>
                        <select class="chart-select">
                            <option>Global</option>
                            <option>US</option>
                            <option>UK</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <!-- Related Keywords Table -->
                <div class="card table-card delay-5">
                    <div class="card-header">
                        <span class="card-title">Related Keywords</span>
                        <button class="icon-btn-sm"><i class="fa-solid fa-download"></i></button>
                    </div>
                    <div class="table-responsive">
                        <table class="vibe-table">
                            <thead>
                                <tr>
                                    <th>Keyword</th>
                                    <th>Volume</th>
                                    <th>Trend</th>
                                    <th>Difficulty</th>
                                </tr>
                            </thead>
                            <tbody id="relatedList">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>

</html>
